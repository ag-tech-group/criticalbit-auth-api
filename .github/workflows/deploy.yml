name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GCP_PROJECT: criticalbit-production
  GCP_REGION: us-east1
  SERVICE_NAME: criticalbit-auth-api
  MIGRATE_JOB_NAME: criticalbit-auth-api-migrate
  IMAGE: us-east1-docker.pkg.dev/criticalbit-production/criticalbit-auth-api/criticalbit-auth-api
  # Cap horizontal scale so DB connections stay bounded:
  # (DB_POOL_SIZE + DB_MAX_OVERFLOW) × MAX_INSTANCES + migrate-job + headroom
  # must stay under Cloud SQL max_connections. At 10/instance, 4 instances =
  # ~40 peak — under db-g1-small's ~50 default (criticalbit-db). Raise this
  # alongside the tier, re-confirming max_connections first. See .env.example.
  MAX_INSTANCES: 4

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/866878908346/locations/global/workloadIdentityPools/github-actions/providers/github-provider
          service_account: github-actions-deploy@criticalbit-production.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # Run migrations before swapping the service. --wait propagates the
      # job's non-zero exit status to this step, which fails the workflow
      # on migration errors and leaves the current service version
      # running. The service update step below never fires in that case.
      - name: Run database migrations
        run: |
          gcloud run jobs update ${{ env.MIGRATE_JOB_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }}
          gcloud run jobs execute ${{ env.MIGRATE_JOB_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ env.GCP_PROJECT }} \
            --wait

      # SENTRY_DSN is bound from Secret Manager (auth-sentry-dsn:latest) and
      # SENTRY_RELEASE is set to the commit SHA so Sentry can group errors,
      # transactions, and profiles by deploy. The secret binding survives
      # `services update --image` automatically, but listing it here makes the
      # production env contract explicit in version control.
      - name: Deploy to Cloud Run
        env:
          COMMIT_SHA: ${{ github.sha }}
          IMAGE_TAG: ${{ env.IMAGE }}:${{ github.sha }}
        run: |
          gcloud run services update "${{ env.SERVICE_NAME }}" \
            --image "$IMAGE_TAG" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT }}" \
            --max-instances "${{ env.MAX_INSTANCES }}" \
            --update-secrets=SENTRY_DSN=auth-sentry-dsn:latest \
            --update-env-vars="SENTRY_RELEASE=$COMMIT_SHA"

      # Cloud Run never auto-prunes old revisions, and a revision pinned by
      # min-instances keeps an instance + its DB connection pool alive even at
      # 0% traffic — so accumulation can silently saturate Cloud SQL's
      # max_connections (the 2026-06-01 morning outage; aoe2-live-standings-api#171).
      # Keep the 2 newest (current + one rollback) and delete the rest.
      # Best-effort: never fail the deploy that just succeeded.
      - name: Prune stale Cloud Run revisions
        continue-on-error: true
        run: |
          set +e
          stale=$(gcloud run revisions list \
            --service "${{ env.SERVICE_NAME }}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT }}" \
            --sort-by '~metadata.creationTimestamp' \
            --format 'value(metadata.name)' | tail -n +3)
          for rev in $stale; do
            echo "Deleting stale revision: $rev"
            gcloud run revisions delete "$rev" \
              --region "${{ env.GCP_REGION }}" \
              --project "${{ env.GCP_PROJECT }}" \
              --quiet || true
          done
